<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <STyle>
         table {
            /* Largura da colunas */
        width: 400px;
        /* Para unir as linhas entre as celulas */
        border-collapse: collapse;
        }
tr.linha {
            background-color: gray;
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
    </STyle>

</head>
<body>
    <table>
        <tr class="linha">
            <td>Nome do produto</td>
            <td>Categoria</td>
            <td>Preço</td>
            <td>Estoque</td>
        </tr>
        <tr>
            <td>Camiseta</td>
            <td>Vestuario</td>
            <td>49,90</td>
            <td>20</td>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>Eletronicos</td>
            <td>3.500,00</td>
            <td>5</td>
        </tr>
         <td>Café gourmet</td>
         <td>Alimentos</td>
         <td>29,90</td>
         <td>15</td>
    </table>
    
</body>
</html>
